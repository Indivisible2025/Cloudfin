name: Build & Submit Flatpak

on:
  push:
    tags:
      - 'v2026.*'
    branches: [main]
  workflow_dispatch:

jobs:
  flatpak:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: cloudfin-ui/linux-desktop/flathub/io.flathub.Cloudfin.yaml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudfin-flatpak
          path: io.flathub.Individible2025.Cloudfin.flatpak

  submit-pr:
    needs: flatpak
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Flathub fork
        uses: actions/checkout@v4
        with:
          repository: ${{ github.actor }}/Flathub
          path: Flathub
          token: ${{ secrets.FLATHUB_TOKEN }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: cloudfin-flatpak
          path: Flathub

      - name: Copy manifest
        run: |
          cp cloudfin-ui/linux-desktop/flathub/io.flathub.Cloudfin.yaml Flathub/apps/io.flathub.Individible2025.Cloudfin.yaml
          cp cloudfin-ui/linux-desktop/flathub/io.flathub.Cloudfin.desktop Flathub/apps/
          cp cloudfin-ui/linux-desktop/src-tauri/icons/128x128.png Flathub/apps/io.flathub.Individible2025.Cloudfin.png || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          repository: flathub/Flathub
          token: ${{ secrets.FLATHUB_TOKEN }}
          branch: add/cloudfin
          commit-message: "Add Cloudfin"
          title: "Add Cloudfin"
          body: |
            Add Cloudfin - P2P Networking & CRDT Sync Desktop UI

            Built from: https://github.com/Indivisible2025/Cloudfin/releases/tag/${{ github.ref_name }}

            WS Protocol: JSON-RPC 2.0
          base: stable
          signoff: true
