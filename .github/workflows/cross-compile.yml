name: Build Cloudfin Core

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ── macOS ────────────────────────────────────────────
  macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Add Apple Silicon target
        run: rustup target add aarch64-apple-darwin

      - name: Build Core (macOS ARM64)
        run: cargo build --release --target aarch64-apple-darwin -p cloudfin-core

      - name: Package
        run: |
          cp target/aarch64-apple-darwin/release/cloudfin-core cloudfin-core
          tar -czf Cloudfin-Core-macOS-arm64-${{ github.ref_name }}.tar.gz cloudfin-core
          rm cloudfin-core

      - name: Upload artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: Cloudfin-Core-macOS-arm64-${{ github.ref_name }}.tar.gz
          asset_name: Cloudfin-Core-macOS-arm64-${{ github.ref_name }}.tar.gz
          asset_content_type: application/gzip

  macos-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Add Intel target
        run: rustup target add x86_64-apple-darwin

      - name: Build Core (macOS x86_64)
        run: cargo build --release --target x86_64-apple-darwin -p cloudfin-core

      - name: Package
        run: |
          cp target/x86_64-apple-darwin/release/cloudfin-core cloudfin-core
          tar -czf Cloudfin-Core-macOS-x86_64-${{ github.ref_name }}.tar.gz cloudfin-core
          rm cloudfin-core

      - name: Upload artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: Cloudfin-Core-macOS-x86_64-${{ github.ref_name }}.tar.gz
          asset_name: Cloudfin-Core-macOS-x86_64-${{ github.ref_name }}.tar.gz
          asset_content_type: application/gzip

  # ── iOS (aarch64 + simulator) ────────────────────────
  ios-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Add iOS targets
        run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim

      - name: Build Core (iOS ARM64)
        run: cargo build --release --target aarch64-apple-ios -p cloudfin-core

      - name: Package
        run: |
          mkdir -p Cloudfin-Core-iOS-arm64-${{ github.ref_name }}
          cp target/aarch64-apple-ios/release/cloudfin-core Cloudfin-Core-iOS-arm64-${{ github.ref_name }}/
          tar -czf Cloudfin-Core-iOS-arm64-${{ github.ref_name }}.tar.gz Cloudfin-Core-iOS-arm64-${{ github.ref_name }}/

      - name: Upload artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: Cloudfin-Core-iOS-arm64-${{ github.ref_name }}.tar.gz
          asset_name: Cloudfin-Core-iOS-arm64-${{ github.ref_name }}.tar.gz
          asset_content_type: application/gzip

  ios-sim:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Add iOS Simulator target
        run: rustup target add aarch64-apple-ios-sim

      - name: Build Core (iOS Simulator ARM64)
        run: cargo build --release --target aarch64-apple-ios-sim -p cloudfin-core

      - name: Package
        run: |
          mkdir -p Cloudfin-Core-iOS-sim-arm64-${{ github.ref_name }}
          cp target/aarch64-apple-ios-sim/release/cloudfin-core Cloudfin-Core-iOS-sim-arm64-${{ github.ref_name }}/
          tar -czf Cloudfin-Core-iOS-sim-arm64-${{ github.ref_name }}.tar.gz Cloudfin-Core-iOS-sim-arm64-${{ github.ref_name }}/

      - name: Upload artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: Cloudfin-Core-iOS-sim-arm64-${{ github.ref_name }}.tar.gz
          asset_name: Cloudfin-Core-iOS-sim-arm64-${{ github.ref_name }}.tar.gz
          asset_content_type: application/gzip

  # ── Create Release ────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: [macos-arm64, macos-x64, ios-arm64, ios-sim]
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Cloudfin Core ${{ github.ref_name }}
          draft: false
          prerelease: true
