name: Build Cloudfin UI (Linux)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            patchelf

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        working-directory: cloudfin-ui/linux-desktop
        run: npm ci

      - name: Build Tauri app
        working-directory: cloudfin-ui/linux-desktop
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare version name
        id: version
        run: |
          TAG=${{ inputs.tag || github.ref_name }}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Upload Linux x86_64 deb
        uses: softprops/upload-gh-release-asset@v1
        with:
          release_url: ${{ steps.create_release.outputs.url }}
          asset_path: cloudfin-ui/linux-desktop/src-tauri/target/release/bundle/deb/cloudfin-ui_*.deb
          asset_name: Cloudfin-UI-Linux-x86_64-${{ steps.version.outputs.version }}.deb
          asset_content_type: application/vnd.debian.binary-package

      - name: Upload AppImage
        uses: softprops/upload-gh-release-asset@v1
        with:
          release_url: ${{ steps.create_release.outputs.url }}
          asset_path: cloudfin-ui/linux-desktop/src-tauri/target/release/bundle/appimage/cloudfin-ui_*.AppImage
          asset_name: Cloudfin-UI-Linux-x86_64-${{ steps.version.outputs.version }}.AppImage
          asset_content_type: application/vnd.appimage

      - name: Build Flatpak
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo || true
          flatpak install -y flathub org.gnome.Platform//47 org.gnome.Sdk//47 2>/dev/null || true
          flatpak install -y flathub org.freedesktop.Sdk.Extension.rust-stable//25.08 org.freedesktop.Sdk.Extension.node22//24.08 2>/dev/null || true
          mkdir -p /tmp/flatpak-repo
          flatpak-builder --force-clean --repo-dir=/tmp/flatpak-repo \
            /tmp/flatpak-build \
            cloudfin-ui/linux-desktop/flatpak/com.cloudfin.UI.yaml
          flatpak build-export /tmp/flatpak-repo \
            Cloudfin-UI-Linux-x86_64-${{ steps.version.outputs.version }}.flatpak

      - name: Upload Flatpak
        uses: softprops/upload-gh-release-asset@v1
        with:
          release_url: ${{ steps.create_release.outputs.url }}
          asset_path: Cloudfin-UI-Linux-x86_64-${{ steps.version.outputs.version }}.flatpak
          asset_name: Cloudfin-UI-Linux-x86_64-${{ steps.version.outputs.version }}.flatpak
          asset_content_type: application/vnd.flatpak

      - name: Create or update release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Cloudfin UI Linux ${{ steps.version.outputs.tag }}
          draft: true
          prerelease: false
          files: |
            cloudfin-ui/linux-desktop/src-tauri/target/release/bundle/deb/*.deb
            cloudfin-ui/linux-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            *.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
